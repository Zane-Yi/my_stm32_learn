version: "4.1"
name: stm32f1xx_gcc
type: ARM
deviceName: null
packDir: null
srcDirs:
  - src
  - App
  - DSP
  - Hard
  - Service
  - lib/STM32F1xx_HAL_Driver/Src
  - Drivers
virtualFolder:
  name: <virtual_root>
  files: []
  folders: []
dependenceList: []
outDir: build
miscInfo:
  lastBuildTime: 1608695075742
  uid: 12a9c3124cec44b4e71d6bac98b11a8d
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - STM32F103xE
        - USE_HAL_DRIVER
        - STM32F10X_HD
      incList:
        - src
        - lib/cmsis
        - User
        - App
        - Hard
        - DSP
        - Service
        - lib/CMSIS/Include
        - lib/STM32F1xx_HAL_Driver
        - lib/STM32F1xx_HAL_Driver/Inc
        - lib/CMSIS/Device/ST/STM32F1xx/Include
        - Drivers
      libList: []
    excludeList:
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_bkp.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_can.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_cec.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_crc.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_dac.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_dbgmcu.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_dma.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_flash.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_fsmc.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_i2c.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_iwdg.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_pwr.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_rtc.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_sdio.c
      - hal/STM32F10x_StdPeriph_Driver/src/stm32f10x_wwdg.c
      - Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_timebase_rtc_alarm_template.c
      - Drivers/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_timebase_tim_template.c
      - lib/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_timebase_rtc_alarm_template.c
      - lib/STM32F1xx_HAL_Driver/Src/stm32f1xx_hal_timebase_tim_template.c
    settings:
      debugger: cortex-debug
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M3
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: softfp
            arm-thumb-mode: thumb
            misc-control: --specs=nosys.specs --specs=nano.specs
            output-debug-info: enable
          linker:
            $toolName: auto
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: .\stm32f1x_64KB_flash.ld
        storageLayout:
          RAM:
            - id: 1
              isChecked: "1"
              mem:
                size: "0x2800"
                startAddr: "0x20000000"
              noInit: false
              tag: IRAM
          ROM:
            - id: 1
              isChecked: "1"
              isStartup: true
              mem:
                size: "0x10000"
                startAddr: "0x08000000"
              tag: IROM
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: "0x08000000"
        bin: ""
        cpuInfo:
          cpuName: STM32F103C8
          vendor: ST
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: cmsis-dap
        target: stm32f1x
    uploader: OpenOCD
